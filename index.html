<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Student Information Management System</h1>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Add Student Details</h2>
            <form id="studentForm">
                <input type="text" id="studentName" placeholder="Enter Name">
                <input type="text" id="rollNo" placeholder="Enter Roll Number">
                <input type="text" id="course" placeholder="Enter Course">
                <input type="email" id="email" placeholder="Enter Email">

                <div class="button-group">
                    <button type="submit">Add Student</button>
                    <button type="reset">Reset</button>
                </div>
            </form>
        </section>

        <section class="table-section">
            <h2>Student Records</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Course</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Student Information Management | MCA II Semester</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
